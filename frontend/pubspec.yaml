name: ai_business_assistant
description: AI Business Assistant - WhatsApp Business Automation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0

  # State Management
  provider: ^6.1.1

  # UI
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0

  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0

  # AI
  google_generative_ai: ^0.2.2
  http: ^1.1.2

  # Voice
  speech_to_text: ^6.6.1
  vosk_flutter: ^0.3.1

  # OCR
  google_mlkit_text_recognition: ^0.12.0
  google_mlkit_barcode_scanning: ^0.11.0

  # Media & Storage
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  cloudinary_public: ^0.21.0

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.1.0
  uuid: ^4.2.1
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/
    - assets/sounds/
